/* ================= 状态 ================= */
let curLevel = -1, curQ = 0, curLesson = 0, stars = 0, answered = false;
const stage = document.getElementById("stage");

function renderStars(){
  let s = "";
  for(let i=0;i<5;i++) s += `<span class="${i<stars?'':'star-dim'}">⭐</span>`;
  document.getElementById("starbar").innerHTML = s;
}

/* ================= 首页 ================= */
function showStart(){
  renderStars();
  stage.innerHTML = `
  <div class="card level-intro">
    <div class="big">🐲</div>
    <h1>城堡里住着一条数学龙！</h1>
    <div class="story">它出了 <b>5 道关卡</b>，每闯过一关就能得到一颗星星 ⭐。<br>
    集齐 <b>5 颗星星</b>，就能打败数学龙，拿到宝藏 🎁！<br><br>
    小勇士，准备好了吗？</div>
    <button class="btn" onclick="startLevel(0)">🚀 出发闯关！</button>
    <details><summary>👨‍👩‍👧 家长使用说明</summary>
    <p>① 全程约 50–60 分钟，每关约 10–12 分钟，关与关之间让孩子站起来跳一跳。<br>
    ② 每关分两步：先『📖 学本领』（1–3 页趣味讲解，带魔法口诀），再『闯关答题』。讲解页请家长照着念，配合动作和实物演示。<br>
    ③ 每页下方都有『家长这样讲 / 这样引导』，点开看讲稿提示。<br>
    ④ 答错不批评，笑着说『再试一次』；能拿实物（豆子、积木）就配合实物玩。<br>
    ⑤ 孩子累了可直接跳到最后一关收尾，保住『闯关成功』的完整体验最重要。</p>
    </details>
  </div>`;
}

/* ================= 关卡入口 ================= */
function startLevel(i){
  curLevel = i; curQ = 0; curLesson = 0;
  const lv = levels[i];
  stage.innerHTML = `
  <div class="card level-intro">
    <div class="kp-badge">第 ${i+1} 关</div>
    <div class="big">${lv.icon}</div>
    <h1>${lv.name}</h1>
    <div class="story">${lv.story}</div>
    <button class="btn" onclick="showLesson()">📖 先学本领！</button>
  </div>`;
}

/* ================= 学本领讲解页 ================= */
function showLesson(){
  const lv = levels[curLevel];
  // 没有讲解页或已讲完 → 进入答题
  if(!lv.lessons || curLesson >= lv.lessons.length){ showQuestion(); return; }
  const ls = lv.lessons[curLesson];
  const total = lv.lessons.length;
  const prog = `<div class="progress">📖 学本领 · 第 ${curLesson+1} / ${total} 页</div>`;
  const isLast = curLesson === total-1;
  stage.innerHTML = `${prog}
  <div class="card">
    <div class="kp-badge learn">📖 学本领：${ls.kp}</div>
    <h2>${ls.title}</h2>
    ${ls.visual?`<div class="lesson-visual">${ls.visual}</div>`:""}
    <div class="lesson-text">${ls.text}</div>
    ${ls.magic?`<div class="magic-word">${ls.magic}</div>`:""}
    <button class="btn" onclick="nextLesson()">${isLast?"本领学会啦，去闯关！💪":"下一页 ➡️"}</button>
    <details><summary>👨‍👩‍👧 家长这样讲</summary><p>${ls.tip}</p></details>
  </div>`;
}
function nextLesson(){ curLesson++; showLesson(); }

/* ================= 出题 ================= */
function showQuestion(){
  answered = false;
  const lv = levels[curLevel], q = lv.questions[curQ];
  const prog = `<div class="progress">${lv.icon} ${lv.name} · 第 ${curQ+1} / ${lv.questions.length} 题</div>`;

  if(q.type === "maze"){ renderMaze(prog, q); return; }
  if(q.type === "sudoku"){ renderSudoku(prog, q); return; }
  if(q.type === "svgcut"){ renderSvgCut(prog, q); return; }
  if(q.type === "clock"){ renderClock(prog, q); return; }

  const oneCol = q.options.some(o=>o.length>6);
  stage.innerHTML = `${prog}
  <div class="card">
    <div class="kp-badge">📌 ${q.kp}</div>
    <h2>${q.title}</h2>
    ${q.visual?`<div class="visual">${q.visual}</div>`:""}
    <div class="opts ${oneCol?'one-col':''}">
      ${q.options.map((o,i)=>`<button class="opt" onclick="pick(this,${i})">${o}</button>`).join("")}
    </div>
    <div class="feedback" id="fb"></div>
    <button class="btn green hidden" id="nextBtn" onclick="nextQ()">下一题 ➡️</button>
    <details><summary>👨‍👩‍👧 家长这样引导</summary><p>${q.tip}</p></details>
  </div>`;
}

const praise = ["太棒了！🎉","答对啦！你真厉害！🌟","哇！小勇士好聪明！💪","完全正确！🎊"];
const retry = ["差一点点，再想想～🤔","没关系，再试一次！💡","嗯…要不要数一数再选？🍀"];

function pick(el, i){
  if(answered) return;
  const q = levels[curLevel].questions[curQ];
  const fb = document.getElementById("fb");
  if(i === q.answer){
    answered = true;
    el.classList.add("correct");
    fb.className = "feedback ok";
    fb.textContent = praise[Math.floor(Math.random()*praise.length)];
    document.getElementById("nextBtn").classList.remove("hidden");
  } else {
    el.classList.add("wrong");
    fb.className = "feedback no";
    fb.textContent = retry[Math.floor(Math.random()*retry.length)];
    setTimeout(()=>el.classList.remove("wrong"), 500);
  }
}

function nextQ(){
  curQ++;
  const lv = levels[curLevel];
  if(curQ < lv.questions.length){ showQuestion(); }
  else { levelClear(); }
}

/* ================= 过关 ================= */
function levelClear(){
  stars = curLevel + 1;
  renderStars();
  if(curLevel === levels.length-1){ showEnd(); return; }
  stage.innerHTML = `
  <div class="card level-intro">
    <div class="confetti">🎉 ⭐ 🎉</div>
    <h1>第 ${curLevel+1} 关通过！</h1>
    <div class="story">你得到了第 <b>${stars}</b> 颗星星！<br>
    💡 休息一下：站起来跳 5 下、喝口水，再继续冒险！</div>
    <button class="btn" onclick="startLevel(${curLevel+1})">前往第 ${curLevel+2} 关 ${levels[curLevel+1].icon} ➡️</button>
  </div>`;
}

function showEnd(){
  stage.innerHTML = `
  <div class="card level-intro">
    <div class="confetti">🎊🏆🎊</div>
    <h1>⭐⭐⭐⭐⭐<br>数学龙认输啦！</h1>
    <div class="big">🐲💦 ➡️ 🎁</div>
    <div class="story">恭喜小勇士集齐 5 颗星星，打败了数学龙，赢得了宝藏！<br><br>
    你今天闯过了：🌲 数字森林、🏰 图形城堡、🧭 方向迷宫、💧 聪明泉水、🐲 终极挑战！<br><br>
    <b>问问自己：我最喜欢哪一关？</b>明天我们把它玩出新花样！</div>
    <button class="btn" onclick="restart()">🔄 再玩一次</button>
    <details><summary>👨‍👩‍👧 给家长的收尾建议</summary>
    <p>① 现在去看看第4关那杯冰水——冰去哪儿了？完成『水的秘密』观察闭环。<br>
    ② 把真实小奖品藏起来，用方向指令（前进两步、向左转…）让孩子找到，顺便复习路线判断。<br>
    ③ 记下孩子最感兴趣和最卡壳的知识点，之后每天只针对一个点玩15分钟。</p>
    </details>

function restart(){ stars = 0; curLevel = -1; curQ = 0; showStart(); }

/* ================= 特殊题型：切正方形 ================= */
function renderSvgCut(prog, q){
  const sq = (line)=>`<svg width="90" height="90" viewBox="0 0 90 90">
    <rect x="10" y="10" width="70" height="70" fill="#ffe0b2" stroke="#8d6e63" stroke-width="3" rx="4"/>
    ${line}</svg>`;
  const lines = [
    sq('<line x1="10" y1="45" x2="80" y2="45" stroke="#e53935" stroke-width="4" stroke-dasharray="8 5"/>'),
    sq('<line x1="45" y1="10" x2="45" y2="80" stroke="#e53935" stroke-width="4" stroke-dasharray="8 5"/>'),
    sq('<line x1="10" y1="10" x2="80" y2="80" stroke="#e53935" stroke-width="4" stroke-dasharray="8 5"/>')

  const labels = ["横着切","竖着切","斜着切"];

    <h2>${q.title}</h2>
    <div class="opts" style="grid-template-columns:repeat(3,1fr)">
      ${lines.map((s,i)=>`<button class="opt svg-opt" onclick="pick(this,${i})">${s}<div style="font-size:14px;margin-top:4px">${labels[i]}</div></button>`).join("")}
    </div>
    <div class="feedback" id="fb"></div>
    <button class="btn green hidden" id="nextBtn" onclick="nextQ()">下一题 ➡️</button>
    <details><summary>👨‍👩‍👧 家长这样引导</summary><p>${q.tip}</p></details>
  </div>`;
}

/* ================= 特殊题型：迷宫 ================= */
let mazePos, mazeDone;
const ROCKS = ["1,1","2,3","3,1"];   // "row,col"
const GOAL = "3,3";
function renderMaze(prog, q){
  mazePos = [0,0]; mazeDone = false;
  stage.innerHTML = `${prog}
  <div class="card">
    <div class="kp-badge">📌 ${q.kp}</div>
    <h2>${q.title}</h2>
    <div class="maze" id="mazeGrid"></div>
    <div class="dpad">
      <button class="dbtn blank"></button>
      <button class="dbtn" onclick="mv(-1,0)">⬆️</button>
      <button class="dbtn blank"></button>
      <button class="dbtn" onclick="mv(0,-1)">⬅️</button>
      <button class="dbtn" onclick="mv(1,0)">⬇️</button>
      <button class="dbtn" onclick="mv(0,1)">➡️</button>
    </div>
    <div class="feedback" id="fb"></div>
    <button class="btn green hidden" id="nextBtn" onclick="nextQ()">下一题 ➡️</button>
    <details><summary>👨‍👩‍👧 家长这样引导</summary><p>${q.tip}</p></details>
  </div>`;
  drawMaze();
}
function drawMaze(){
  const g = document.getElementById("mazeGrid");
  let html = "";
  for(let r=0;r<4;r++)for(let c=0;c<4;c++){
    const key = r+","+c;
    let content = "", cls = "cell";
    if(ROCKS.includes(key)){ content="🪨"; cls+=" rock"; }
    if(key===GOAL) content = (mazePos[0]===3&&mazePos[1]===3)?"🧒":"🎁";
    if(mazePos[0]===r&&mazePos[1]===c&&key!==GOAL) content="🧒";
    html += `<div class="${cls}">${content}</div>`;
  }
  g.innerHTML = html;
}
function mv(dr,dc){
  if(mazeDone) return;
  const nr = mazePos[0]+dr, nc = mazePos[1]+dc;
  const fb = document.getElementById("fb");
  if(nr<0||nr>3||nc<0||nc>3){ fb.className="feedback no"; fb.textContent="撞墙啦！换个方向～🧱"; return; }
  if(ROCKS.includes(nr+","+nc)){ fb.className="feedback no"; fb.textContent="前面是大石头，绕开它！🪨"; return; }
  mazePos = [nr,nc]; drawMaze();
  if(nr+","+nc === GOAL){
    mazeDone = true;
    fb.className="feedback ok"; fb.textContent="找到宝箱啦！小勇士太厉害了！🎉";
    document.getElementById("nextBtn").classList.remove("hidden");
  } else {
    fb.className="feedback"; fb.textContent="";
  }
}

/* ================= 特殊题型：数独 ================= */
/* 棋盘: 固定 (0,0)=1, (1,1)=1；答案 (0,1)=2, (1,0)=2 */
let sk;
function renderSudoku(prog, q){
  sk = [[1,0],[0,1]]; // 0 = 空
  stage.innerHTML = `${prog}
  <div class="card">
    <div class="kp-badge">📌 ${q.kp}</div>
    <h2>${q.title}</h2>
    <div class="sudoku" id="skGrid"></div>
    <div class="hint">👆 点击虚线空格，在 1 和 2 之间切换</div>
    <button class="btn" id="skCheck" onclick="checkSudoku()">检查魔法阵 ✨</button>
    <div class="feedback" id="fb"></div>
    <button class="btn green hidden" id="nextBtn" onclick="nextQ()">下一题 ➡️</button>
    <details><summary>👨‍👩‍👧 家长这样引导</summary><p>${q.tip}</p></details>
  </div>`;
  drawSudoku();
}
function drawSudoku(){
  const fixed = [[true,false],[false,true]];
  let html = "";
  for(let r=0;r<2;r++)for(let c=0;c<2;c++){
    if(fixed[r][c]) html += `<div class="sq fixed">${sk[r][c]}</div>`;
    else html += `<div class="sq free" onclick="tapSq(${r},${c})">${sk[r][c]||""}</div>`;
  }
  document.getElementById("skGrid").innerHTML = html;
}
function tapSq(r,c){
  sk[r][c] = sk[r][c]===0 ? 1 : (sk[r][c]===1 ? 2 : 0);
  drawSudoku();
}
function checkSudoku(){
  const fb = document.getElementById("fb");
  if(sk[0][1]===2 && sk[1][0]===2){
    fb.className="feedback ok"; fb.textContent="魔法阵完成！每行每列都不重复！🎉";
    document.getElementById("nextBtn").classList.remove("hidden");
    document.getElementById("skCheck").classList.add("hidden");
  } else if(sk[0][1]===0 || sk[1][0]===0){
    fb.className="feedback no"; fb.textContent="还有空格没填哦～👆";
  } else {
    fb.className="feedback no"; fb.textContent="有数字重复啦！看看每一行、每一列～🔍";
  }
}

showStart();
</script>
