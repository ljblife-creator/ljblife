/* ================= 状态 ================= */
let curLevel = -1, curQ = 0, curLesson = 0, medals = 0, answered = false;
const stage = document.getElementById("stage");

function renderMedals(){
  let s = "";
  for(let i=0;i<5;i++) s += `<span class="${i<medals?'':'medal-dim'}">🏅</span>`;
  document.getElementById("medalbar").innerHTML = s;
}

/* ================= 首页 ================= */
function showStart(){
  renderMedals();
  stage.innerHTML = `
  <div class="card level-intro">
    <div class="big">😈</div>
    <h1>坏习惯怪兽军团来啦！</h1>
    <div class="story">懒懒虫 🐛、丢丢怪 👻、拖拉怪 😈 混进了小朋友的生活，
    专门捣乱：让你赖床、丢东西、磨磨蹭蹭……<br><br>
    只有闯过 <b>5 个训练站</b>、集齐 <b>5 枚好习惯勋章</b> 🏅，
    才能变身<b>好习惯小超人</b> 🦸，把怪兽们统统赶跑！<br><br>
    小超人，开始训练吧！</div>
    <button class="btn" onclick="startLevel(0)">🚀 开始训练！</button>
    <details><summary>👨‍👩‍👧 家长使用说明</summary>
    <p>① 本训练营针对 5–7 岁幼小衔接阶段，精选五大类核心习惯：<b>作息自理、整理收纳、课堂习惯、时间管理、礼貌安全</b>。<br>
    ② 每站分两步：先『📖 学本领』（趣味讲解+魔法口诀），再『闯关挑战』。全程约 50–60 分钟，也可以每天只玩一站。<br>
    ③ 习惯不是玩一次就会的——每页下方的『家长这样做』给出了课后落地方法，真正的训练在日常生活里。<br>
    ④ 建议配合『21 天打卡表』：每天做到一个习惯就贴一颗星，集满有小奖励。</p>
    </details>
  </div>`;
}

/* ================= 关卡入口 ================= */
function startLevel(i){
  curLevel = i; curQ = 0; curLesson = 0;
  const lv = levels[i];
  stage.innerHTML = `
  <div class="card level-intro">
    <div class="kp-badge">第 ${i+1} 站</div>
    <div class="big">${lv.icon}</div>
    <h1>${lv.name}</h1>
    <div class="story">${lv.story}</div>
    <button class="btn" onclick="showLesson()">📖 先学本领！</button>
  </div>`;
}

/* ================= 学本领讲解页 ================= */
function showLesson(){
  const lv = levels[curLevel];
  if(!lv.lessons || curLesson >= lv.lessons.length){ showQuestion(); return; }
  const ls = lv.lessons[curLesson];
  const total = lv.lessons.length;
  const prog = `<div class="progress">📖 学本领 · 第 ${curLesson+1} / ${total} 页</div>`;
  const isLast = curLesson === total-1;
  stage.innerHTML = `${prog}
  <div class="card">
    <div class="kp-badge learn">📖 学本领：${ls.kp}</div>
    <h2>${ls.title}</h2>
    ${ls.visual?`<div class="lesson-visual">${ls.visual}</div>`:""}
    <div class="lesson-text">${ls.text}</div>
    ${ls.magic?`<div class="magic-word">${ls.magic}</div>`:""}
    <button class="btn blue" onclick="nextLesson()">${isLast?"本领学会啦，去挑战！💪":"下一页 ➡️"}</button>
    <details><summary>👨‍👩‍👧 家长这样做</summary><p>${ls.tip}</p></details>
  </div>`;
}
function nextLesson(){ curLesson++; showLesson(); }

/* ================= 出题 ================= */
function showQuestion(){
  answered = false;
  const lv = levels[curLevel], q = lv.questions[curQ];
  const prog = `<div class="progress">${lv.icon} ${lv.name} · 第 ${curQ+1} / ${lv.questions.length} 题</div>`;

  if(q.type === "pack"){ renderPack(prog, q); return; }
  if(q.type === "seq"){ renderSeq(prog, q); return; }

  const oneCol = q.options.some(o=>o.length>7);
  stage.innerHTML = `${prog}
  <div class="card">
    <div class="kp-badge">📌 ${q.kp}</div>
    <h2>${q.title}</h2>
    ${q.visual?`<div class="visual">${q.visual}</div>`:""}
    <div class="opts ${oneCol?'one-col':''}">
      ${q.options.map((o,i)=>`<button class="opt" onclick="pick(this,${i})">${o}</button>`).join("")}
    </div>
    <div class="feedback" id="fb"></div>
    <button class="btn green hidden" id="nextBtn" onclick="nextQ()">下一题 ➡️</button>
    <details><summary>👨‍👩‍👧 家长这样引导</summary><p>${q.tip}</p></details>
  </div>`;
}

const praise = ["太棒了！🎉","答对啦！小超人真厉害！🌟","哇！这就是好习惯！💪","完全正确！怪兽害怕啦！🎊"];
const retry = ["再想想，小超人会怎么做？🤔","没关系，再试一次！💡","嗯…好习惯是哪一个呢？🍀"];

function pick(el, i){
  if(answered) return;
  const q = levels[curLevel].questions[curQ];
  const fb = document.getElementById("fb");
  if(i === q.answer){
    answered = true;
    el.classList.add("correct");
    fb.className = "feedback ok";
    fb.textContent = praise[Math.floor(Math.random()*praise.length)];
    document.getElementById("nextBtn").classList.remove("hidden");
  } else {
    el.classList.add("wrong");
    fb.className = "feedback no";
    fb.textContent = retry[Math.floor(Math.random()*retry.length)];
    setTimeout(()=>el.classList.remove("wrong"), 500);
  }
}

function nextQ(){
  curQ++;
  const lv = levels[curLevel];
  if(curQ < lv.questions.length){ showQuestion(); }
  else { levelClear(); }
}

/* ================= 特殊题型：整理书包 ================= */
let packSel;
function renderPack(prog, q){
  packSel = new Set();
  stage.innerHTML = `${prog}
  <div class="card">
    <div class="kp-badge">📌 ${q.kp}</div>
    <h2>${q.title}</h2>
    <div class="pack-grid" id="packGrid"></div>
    <button class="btn" id="packCheck" onclick="checkPack()">检查书包 🎒</button>
    <div class="feedback" id="fb"></div>
    <button class="btn green hidden" id="nextBtn" onclick="nextQ()">下一题 ➡️</button>
    <details><summary>👨‍👩‍👧 家长这样引导</summary><p>${q.tip}</p></details>
  </div>`;
  drawPack(q);
}
function drawPack(q){
  const g = document.getElementById("packGrid");
  g.innerHTML = q.items.map((it,i)=>`
    <div class="pack-item ${packSel.has(i)?'picked':''}" onclick="tapPack(${i})">
      <div class="pi-icon">${it.icon}</div><div class="pi-name">${it.name}</div>
    </div>`).join("");
}
function tapPack(i){
  if(answered) return;
  if(packSel.has(i)) packSel.delete(i); else packSel.add(i);
  drawPack(levels[curLevel].questions[curQ]);
}
function checkPack(){
  if(answered) return;
  const q = levels[curLevel].questions[curQ];
  const fb = document.getElementById("fb");
  const correct = q.items.every((it,i)=> it.inBag === packSel.has(i));
  const g = document.getElementById("packGrid");
  if(correct){
    answered = true;
    g.querySelectorAll(".pack-item").forEach((el,i)=>{
      if(q.items[i].inBag) el.className = "pack-item good";
    });
    fb.className = "feedback ok"; fb.textContent = "书包理得整整齐齐！丢丢怪气跑啦！🎉";
    document.getElementById("nextBtn").classList.remove("hidden");
    document.getElementById("packCheck").classList.add("hidden");
  } else {
    g.querySelectorAll(".pack-item").forEach((el,i)=>{
      const wrongPick = packSel.has(i) && !q.items[i].inBag;
      const missed = !packSel.has(i) && q.items[i].inBag;
      if(wrongPick || missed){
        el.classList.add("bad");
        setTimeout(()=>el.classList.remove("bad"), 500);
      }
    });
    fb.className = "feedback no";
    fb.textContent = "再检查一下：上学要带什么？什么不能带？🤔";
  }
}

/* ================= 特殊题型：排顺序 ================= */
let seqNext, seqMark;
function renderSeq(prog, q){
  seqNext = 0; seqMark = {};
  stage.innerHTML = `${prog}
  <div class="card">
    <div class="kp-badge">📌 ${q.kp}</div>
    <h2>${q.title}</h2>
    <div class="seq-grid" id="seqGrid"></div>
    <div class="feedback" id="fb"></div>
    <button class="btn green hidden" id="nextBtn" onclick="nextQ()">下一题 ➡️</button>
    <details><summary>👨‍👩‍👧 家长这样引导</summary><p>${q.tip}</p></details>
  </div>`;
  drawSeq(q);
}
function drawSeq(q){
  const g = document.getElementById("seqGrid");
  g.innerHTML = q.items.map((it,i)=>`
    <div class="seq-item ${seqMark[i]!==undefined?'done':''}" onclick="tapSeq(${i})">
      ${seqMark[i]!==undefined?`<div class="seq-num">${seqMark[i]+1}</div>`:""}
      <div class="si-icon">${it.icon}</div><div class="si-name">${it.name}</div>
    </div>`).join("");
}
function tapSeq(i){
  if(answered || seqMark[i]!==undefined) return;
  const q = levels[curLevel].questions[curQ];
  const fb = document.getElementById("fb");
  if(q.items[i].order === seqNext){
    seqMark[i] = seqNext; seqNext++;
    drawSeq(q);
    if(seqNext === q.items.length){
      answered = true;
      fb.className = "feedback ok"; fb.textContent = "顺序完全正确！小超人真会安排！🎉";
      document.getElementById("nextBtn").classList.remove("hidden");
    } else {
      fb.className = "feedback ok"; fb.textContent = `对啦！接下来第 ${seqNext+1} 步做什么？`;
    }
  } else {
    fb.className = "feedback no";
    fb.textContent = "咦，这一步好像早了点？想想先做什么～🤔";
  }
}

/* ================= 过关 ================= */
function levelClear(){
  medals = curLevel + 1;
  renderMedals();
  if(curLevel === levels.length-1){ showEnd(); return; }
  stage.innerHTML = `
  <div class="card level-intro">
    <div class="confetti">🎉 🏅 🎉</div>
    <h1>第 ${curLevel+1} 站通过！</h1>
    <div class="story">你得到了第 <b>${medals}</b> 枚好习惯勋章！<br>
    💡 休息一下：站起来伸个懒腰、喝口水，再继续训练！</div>
    <button class="btn" onclick="startLevel(${curLevel+1})">前往第 ${curLevel+2} 站 ${levels[curLevel+1].icon} ➡️</button>
  </div>`;
}

function showEnd(){
  stage.innerHTML = `
  <div class="card level-intro">
    <div class="confetti">🎊🦸🎊</div>
    <h1>🏅🏅🏅🏅🏅<br>变身成功！</h1>
    <div class="big">🐛💨 👻💨 😈💨</div>
    <div class="story">恭喜你集齐 5 枚勋章，正式成为<b>好习惯小超人</b>！<br>
    懒懒虫、丢丢怪、拖拉怪都被你吓跑啦！<br><br>
    你今天学会了：🌅 自己的事情自己做、🎒 理书包和归位、📚 课堂三魔法、⏰ 先完成再玩、🤝 礼貌与安全！<br><br>
    <b>但是要小心：怪兽们每天都会偷偷回来！</b><br>
    只有每天坚持好习惯，才能一直当小超人哦！</div>
    <button class="btn" onclick="restart()">🔄 再训练一次</button>
    <details><summary>👨‍👩‍👧 给家长的收尾建议（重要）</summary>
    <p>① 习惯靠重复，不靠一次游戏。从今晚开始挑 <b>1–2 个</b>最急需的习惯先落地（推荐：睡前理书包 + 先完成再玩），别贪多。<br>
    ② 做一张『21 天打卡表』贴冰箱上：每天做到就让孩子自己贴一颗星，比口头表扬有效得多。<br>
    ③ 把怪兽名字用起来：孩子磨蹭时不说『你怎么这么慢』，改说『拖拉怪来了，快打败它！』——对抗怪兽比对抗爸妈有趣。<br>
    ④ 家长以身作则是终极秘诀：您睡前整理自己的包，孩子自然会整理书包。<br>
    ⑤ 每周日晚上可以重玩一次本训练营当『周复习』，让孩子给自己打分。</p>
    </details>
  </div>`;
}

function restart(){ medals = 0; curLevel = -1; curQ = 0; curLesson = 0; showStart(); }

showStart();
</script>
